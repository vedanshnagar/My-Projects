<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>CSS Selectors</title>
  <style>
    /* Element Selector */
    /*  div {
     background-color: red;
   } */

    /* Class Selector */

    .red {
      background-color: red;
    }

    /* Id Selector */
    #green {
      background-color: green;
    }

    /* Child Selector */

    div > p {
      color: blue;
      background-color: brown;
    }

    /* Descendent Selector */
    div p {
      color: blue;
      background-color: brown;
    }
    /* Universal Selector */
    * {
      margin: 0;
      padding: 0;
    }
    /* Pseudo Selector */
    a:visited {
      color: yellow;
    }
    a:link {
      color: green;
    }
    a:active {
      background-color: red;
    }
    a:hover {
      background-color: yellow;
    }

    p:first-child {
      background-color: aqua;
    }


  </style>

</head>
<body>
  <main class="One">
    <p>
      I am First
    </p>
    <p>
      I am Second
    </p>
  </main>
  <div class="red">
    I am a div
    <article>
      <p>
        I am a para inside div
      </p>
    </article>
  </div>
  <div id="green">
    I am another div
  </div>
  <a href="https://google.com">Go to Google</a>
  <a href="https://facebook.com">Go to Facebook</a>
</body>
</html>
